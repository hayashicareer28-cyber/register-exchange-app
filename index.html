<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>レジ両替システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>レジ両替システム</h1>

  <p class="description">
    各レジのお金の枚数を入力し、「両替指示を作成」を押してください。
  </p>

  <div class="register-area">
    <section class="register-card">
      <h2>1レジ</h2>
      <label>1万円札：<input type="number" id="r1-10000" value="0" min="0" step="1">枚</label>
      <label>5000円札：<input type="number" id="r1-5000" value="0" min="0" step="1">枚</label>
      <label>1000円札：<input type="number" id="r1-1000" value="0" min="0" step="1">枚</label>
      <label>500円玉：<input type="number" id="r1-500" value="0" min="0" step="1">枚</label>
      <label>100円玉：<input type="number" id="r1-100" value="0" min="0" step="1">枚</label>
      <label>50円玉：<input type="number" id="r1-50" value="0" min="0" step="1">枚</label>
      <label>10円玉：<input type="number" id="r1-10" value="0" min="0" step="1">枚</label>
      <label>5円玉：<input type="number" id="r1-5" value="0" min="0" step="1">枚</label>
      <label>1円玉：<input type="number" id="r1-1" value="0" min="0" step="1">枚</label>
    </section>

    <section class="register-card">
      <h2>2レジ</h2>
      <label>1万円札：<input type="number" id="r2-10000" value="0" min="0" step="1">枚</label>
      <label>5000円札：<input type="number" id="r2-5000" value="0" min="0" step="1">枚</label>
      <label>1000円札：<input type="number" id="r2-1000" value="0" min="0" step="1">枚</label>
      <label>500円玉：<input type="number" id="r2-500" value="0" min="0" step="1">枚</label>
      <label>100円玉：<input type="number" id="r2-100" value="0" min="0" step="1">枚</label>
      <label>50円玉：<input type="number" id="r2-50" value="0" min="0" step="1">枚</label>
      <label>10円玉：<input type="number" id="r2-10" value="0" min="0" step="1">枚</label>
      <label>5円玉：<input type="number" id="r2-5" value="0" min="0" step="1">枚</label>
      <label>1円玉：<input type="number" id="r2-1" value="0" min="0" step="1">枚</label>
    </section>

    <section class="register-card">
      <h2>3レジ</h2>
      <label>1万円札：<input type="number" id="r3-10000" value="0" min="0" step="1">枚</label>
      <label>5000円札：<input type="number" id="r3-5000" value="0" min="0" step="1">枚</label>
      <label>1000円札：<input type="number" id="r3-1000" value="0" min="0" step="1">枚</label>
      <label>500円玉：<input type="number" id="r3-500" value="0" min="0" step="1">枚</label>
      <label>100円玉：<input type="number" id="r3-100" value="0" min="0" step="1">枚</label>
      <label>50円玉：<input type="number" id="r3-50" value="0" min="0" step="1">枚</label>
      <label>10円玉：<input type="number" id="r3-10" value="0" min="0" step="1">枚</label>
      <label>5円玉：<input type="number" id="r3-5" value="0" min="0" step="1">枚</label>
      <label>1円玉：<input type="number" id="r3-1" value="0" min="0" step="1">枚</label>
    </section>
  </div>

  <div class="button-area">
    <button onclick="calculate()">両替指示を作成</button>
    <button onclick="copyResult()">コピー用テキストをコピー</button>
  </div>

  <h2>結果</h2>
  <div id="result" class="result-box">ここに結果が表示されます。</div>

  <h2>コピー用テキスト</h2>
  <pre id="copyText" class="copy-box">ここにコピー用テキストが表示されます。</pre>

  <script src="script.js"></script>
</body>
</html>
